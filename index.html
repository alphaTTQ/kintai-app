<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>勤怠管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI",sans-serif;background:#f5f4f1;color:#1a1a18;font-size:14px;min-height:100vh}
:root{
  --blue:#378ADD;--blue-bg:#E6F1FB;--blue-text:#185FA5;
  --red:#A32D2D;--red-bg:#FCEBEB;
  --green:#3B6D11;--green-bg:#EAF3DE;
  --purple-bg:#EEEDFE;--purple-text:#534AB7;
  --orange:#7a5a00;--orange-bg:#FAEEDA;
  --border:rgba(0,0,0,0.11);--gray:#9a9a94;--surface:#e8e7e3;--white:#fff;
  --r:8px;--nav-h:52px;--bottom-h:60px;
}
.top-nav{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;gap:4px;
  padding:0 12px;height:var(--nav-h);
  background:var(--white);border-bottom:0.5px solid var(--border);
  overflow-x:auto;-webkit-overflow-scrolling:touch;white-space:nowrap;
}
.top-nav::-webkit-scrollbar{display:none}
.logo{font-weight:700;font-size:15px;margin-right:8px;flex-shrink:0}
.nav-btn{padding:6px 12px;border:none;border-radius:var(--r);cursor:pointer;font-size:13px;background:transparent;color:#5c5c57;flex-shrink:0;font-weight:500}
.nav-btn.active{background:var(--blue-bg);color:var(--blue-text);font-weight:700}
.bottom-nav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  height:var(--bottom-h);z-index:100;
  background:var(--white);border-top:0.5px solid var(--border);
  padding-bottom:env(safe-area-inset-bottom);
}
.bottom-nav-inner{display:flex;height:100%}
.bnav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  border:none;background:transparent;cursor:pointer;gap:2px;padding:6px 0;
  color:var(--gray);font-size:10px;font-weight:500;
}
.bnav-btn.active{color:var(--blue-text)}
.bnav-icon{font-size:20px;line-height:1}
#app{padding:12px;padding-bottom:calc(var(--bottom-h) + 12px)}
.card{background:var(--white);border:0.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:2px 7px;border-radius:99px;margin-left:4px;white-space:nowrap}
.b-blue{background:var(--blue-bg);color:var(--blue-text)}
.b-purple{background:var(--purple-bg);color:var(--purple-text)}
.b-green{background:var(--green-bg);color:var(--green)}
.b-red{background:var(--red-bg);color:var(--red)}
.b-orange{background:var(--orange-bg);color:var(--orange)}
.b-gray{background:var(--surface);color:var(--gray)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;
  padding:8px 16px;border-radius:var(--r);cursor:pointer;font-size:14px;font-weight:600;border:none;white-space:nowrap;line-height:1.2}
.btn-p{background:var(--blue);color:#fff}
.btn-s{background:var(--surface);color:#5c5c57;border:0.5px solid var(--border)}
.btn-d{background:var(--red-bg);color:var(--red);border:0.5px solid #F09595}
.btn-w{background:var(--orange-bg);color:var(--orange);border:0.5px solid #EF9F27}
.btn-sm{padding:5px 10px;font-size:12px;font-weight:500}
.btn:disabled{background:var(--surface);color:var(--gray);cursor:not-allowed;border:none}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat{background:var(--white);border-radius:12px;padding:12px}
.stat-label{font-size:11px;color:var(--gray);margin-bottom:3px}
.stat-value{font-size:18px;font-weight:600;font-variant-numeric:tabular-nums}
label{display:block;font-size:11px;color:var(--gray);margin-bottom:3px;font-weight:500}
input,select{
  width:100%;padding:10px;border:0.5px solid var(--border);border-radius:var(--r);
  font-size:16px;background:var(--white);color:#1a1a18;outline:none;
  -webkit-appearance:none;appearance:none;
}
input:focus,select:focus{border-color:var(--blue)}
input[type=time],input[type=date],input[type=month],input[type=number]{font-size:14px}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:400px}
th{padding:9px 10px;text-align:left;font-size:12px;color:var(--gray);font-weight:500;background:var(--surface);border-bottom:0.5px solid var(--border);white-space:nowrap}
td{padding:9px 10px;font-size:13px;border-bottom:0.5px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
.emp-picker{display:none;margin-bottom:12px}
.sidebar{width:148px;border-right:0.5px solid var(--border);padding:8px 0;flex-shrink:0}
.sidebar-label{padding:0 14px 5px;font-size:11px;color:var(--gray);font-weight:600}
.sidebar-btn{width:100%;text-align:left;padding:7px 14px;border:none;cursor:pointer;background:transparent;font-size:13px}
.punch-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.punch-btn{padding:16px;font-size:16px;font-weight:700;border:none;border-radius:var(--r);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.edit-inline{background:var(--blue-bg);border-top:0.5px solid var(--border);padding:12px;display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end}
.save-pill{display:none;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px}
.pill-ok{background:var(--green-bg);color:var(--green)}
.pill-ng{background:var(--red-bg);color:var(--red)}
.corr-panel{background:var(--white);border:0.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px}
.corr-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface);border-bottom:0.5px solid var(--border);flex-wrap:wrap;gap:6px}
.diff-b{color:var(--red);text-decoration:line-through;margin-right:3px}
.diff-a{color:var(--green)}
.empty{padding:2rem;text-align:center;color:var(--gray);font-size:13px}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}

@media(max-width:600px){
  .top-nav .nav-btn{display:none}
  .bottom-nav{display:block}
  #app{padding:10px;padding-bottom:calc(var(--bottom-h) + env(safe-area-inset-bottom) + 10px)}
  .stat-grid{grid-template-columns:1fr 1fr}
  .sidebar{display:none}
  .emp-picker{display:block}
  .layout-main{padding:0!important}
  .punch-btn{padding:18px;font-size:17px}
  table{min-width:340px}
  th,td{padding:8px 8px;font-size:12px}
}
@media(min-width:601px){
  .top-nav .nav-btn{display:inline-flex}
  .logo{display:block}
}
</style>
</head>
<body>

<nav class="top-nav">
  <span class="logo">⏱ 勤怠管理</span>
  <button class="nav-btn" id="nav-clock"   onclick="go('clock')">打刻</button>
  <button class="nav-btn active" id="nav-report"  onclick="go('report')">月次レポート</button>
  <button class="nav-btn" id="nav-payroll" onclick="go('payroll')">給与計算</button>
  <button class="nav-btn" id="nav-admin"   onclick="go('admin')">従業員管理</button>
</nav>

<div class="bottom-nav">
  <div class="bottom-nav-inner">
    <button class="bnav-btn" id="bn-clock"   onclick="go('clock')"><span class="bnav-icon">⏰</span>打刻</button>
    <button class="bnav-btn active" id="bn-report"  onclick="go('report')"><span class="bnav-icon">📊</span>レポート</button>
    <button class="bnav-btn" id="bn-payroll" onclick="go('payroll')"><span class="bnav-icon">💴</span>給与</button>
    <button class="bnav-btn" id="bn-admin"   onclick="go('admin')"><span class="bnav-icon">👥</span>従業員</button>
  </div>
</div>

<div id="app"></div>

<script>
// ── ストレージ（localStorage） ───────────────────────────
const STORE_KEY = "kintai_v1";
function loadData() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(_) {}
  return null;
}
function saveData(data) {
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify(data));
    return true;
  } catch(_) { return false; }
}

// ── 初期データ ───────────────────────────────────────────
let employees = [
  {id:"e1",name:"田中 太郎",dept:"営業部",type:"正社員",salary:280000,stdH:160},
  {id:"e2",name:"佐藤 花子",dept:"経理部",type:"正社員",salary:260000,stdH:160},
  {id:"e3",name:"鈴木 一郎",dept:"営業部",type:"パート",salary:1200,stdH:160},
];
const MK=(id,date,ci,co)=>({id:`r${id}${date}`,eid:id,date,ci,co});
let records=[
  MK("e1","2026-06-01","09:02","18:35"),MK("e1","2026-06-02","08:58","20:10"),MK("e1","2026-06-03","09:05","18:00"),
  MK("e1","2026-06-04","09:00","19:45"),MK("e1","2026-06-05","09:10","18:30"),MK("e1","2026-06-08","09:00","18:00"),
  MK("e1","2026-06-09","08:55","21:00"),MK("e1","2026-06-10","09:03","18:15"),MK("e1","2026-06-11","09:00","18:00"),
  MK("e1","2026-06-12","09:07","19:30"),MK("e1","2026-06-15","09:00","18:00"),MK("e1","2026-06-16","08:50","18:00"),
  MK("e1","2026-06-17","09:00","20:30"),MK("e1","2026-06-18","09:05","18:00"),MK("e1","2026-06-19","09:00","18:45"),
  MK("e1","2026-06-22","09:00","18:00"),MK("e1","2026-06-23","09:00","19:00"),MK("e1","2026-06-24","09:10","18:00"),
  MK("e1","2026-06-25","09:00","18:30"),MK("e1","2026-06-26","08:58","18:00"),MK("e1","2026-06-29","09:00","18:00"),
  MK("e1","2026-06-30","09:05","21:15"),MK("e1","2026-07-01","09:00","18:00"),MK("e1","2026-07-02","08:55","18:30"),
  MK("e2","2026-06-01","09:00","18:00"),MK("e2","2026-06-02","09:00","18:00"),MK("e2","2026-06-03","09:05","18:00"),
  MK("e2","2026-06-04","09:00","18:05"),MK("e2","2026-06-05","09:00","18:00"),MK("e2","2026-06-08","09:10","18:00"),
  MK("e2","2026-06-09","09:00","18:00"),MK("e2","2026-06-10","09:00","18:10"),MK("e2","2026-06-11","09:00","18:00"),
  MK("e2","2026-06-12","09:00","18:30"),MK("e2","2026-06-15","09:05","18:00"),MK("e2","2026-06-16","09:00","18:00"),
  MK("e2","2026-06-17","09:00","18:00"),MK("e2","2026-06-18","09:00","18:15"),MK("e2","2026-06-19","09:00","18:00"),
  MK("e2","2026-06-22","09:00","18:00"),MK("e2","2026-06-23","09:00","18:00"),MK("e2","2026-06-24","09:10","18:00"),
  MK("e2","2026-06-25","09:00","18:00"),MK("e2","2026-06-26","09:00","18:00"),MK("e2","2026-06-29","09:00","18:00"),
  MK("e2","2026-06-30","09:00","18:00"),MK("e2","2026-07-01","09:00","18:00"),MK("e2","2026-07-02","09:05","18:00"),
  MK("e3","2026-06-02","10:00","15:00"),MK("e3","2026-06-03","10:00","16:00"),MK("e3","2026-06-05","10:00","15:30"),
  MK("e3","2026-06-09","10:00","15:00"),MK("e3","2026-06-10","10:00","16:00"),MK("e3","2026-06-11","10:00","15:00"),
  MK("e3","2026-06-12","10:00","15:30"),MK("e3","2026-06-16","10:00","15:00"),MK("e3","2026-06-17","10:00","16:30"),
  MK("e3","2026-06-18","10:00","15:00"),MK("e3","2026-06-23","10:00","15:00"),MK("e3","2026-06-24","10:00","16:00"),
  MK("e3","2026-06-25","10:00","15:00"),MK("e3","2026-06-26","10:00","15:30"),MK("e3","2026-06-30","10:00","15:00"),
  MK("e3","2026-07-01","10:00","15:00"),MK("e3","2026-07-02","10:00","16:00"),
];
let corrections = [];

// 既存データがあれば上書き
const saved = loadData();
if (saved) {
  if (saved.employees?.length) employees = saved.employees;
  if (saved.records?.length)   records   = saved.records;
  if (saved.corrections?.length) corrections = saved.corrections;
}

let view="report", selId=employees[0]?.id, editId=null;
let reportMonth="2026-06", ieId=null, showCorr=false, corrFilter="all";

// ── ユーティリティ ───────────────────────────────────────
const today  = () => new Date().toISOString().split("T")[0];
const nowHM  = () => { const d=new Date(); return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`; };
const calcH  = (a,b) => { if(!a||!b)return 0; const[ah,am]=a.split(":").map(Number),[bh,bm]=b.split(":").map(Number); return Math.max(0,(bh*60+bm-ah*60-am)/60); };
const yen    = n => n.toLocaleString("ja-JP",{style:"currency",currency:"JPY",maximumFractionDigits:0});
const abg    = t => t==="正社員"?"#E6F1FB":"#EEEDFE";
const acl    = t => t==="正社員"?"#185FA5":"#534AB7";
const tb     = t => t==="正社員"?`<span class="badge b-blue">正社員</span>`:`<span class="badge b-purple">パート</span>`;
const fdt    = ts => { const d=new Date(ts); return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`; };

function calcPay(emp, th, ot) {
  if (!emp.salary || emp.salary <= 0) return null;
  if (emp.type === "正社員") {
    const hr = emp.salary / (emp.stdH || 160), op = Math.round(hr * 1.25 * ot);
    return { base: emp.salary, op, total: emp.salary + op, hr: Math.round(hr) };
  }
  const reg = Math.max(0, th - ot), base = Math.round(emp.salary * reg), op = Math.round(emp.salary * 1.25 * ot);
  return { base, op, total: base + op, hr: emp.salary };
}

function persist() {
  const ok = saveData({ employees, records, corrections });
  pill(ok ? "ok" : "ng");
}

function pill(s) {
  document.querySelectorAll(".save-pill").forEach(el => {
    el.textContent = s === "ok" ? "✓ 保存しました" : "⚠ 保存に失敗";
    el.className = "save-pill " + (s === "ok" ? "pill-ok" : "pill-ng");
    el.style.display = "inline-flex";
    setTimeout(() => el.style.display = "none", 2500);
  });
}

function logC(type, eid, date, before, after, note="") {
  const emp = employees.find(e => e.id === eid);
  corrections.unshift({ id:"c"+Date.now(), ts:Date.now(), type, eid, name:emp?.name||"", date, before, after, note });
}

// ── ナビ ────────────────────────────────────────────────
function go(v) {
  view = v; ieId = null;
  document.querySelectorAll(".nav-btn,.bnav-btn").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(`#nav-${v},#bn-${v}`).forEach(b => b.classList.add("active"));
  render();
}

function render() {
  const app = document.getElementById("app"); if (!app) return;
  if (view === "clock")   app.innerHTML = rClock();
  if (view === "report")  app.innerHTML = rReport();
  if (view === "payroll") app.innerHTML = rPayroll();
  if (view === "admin")   app.innerHTML = rAdmin();
}

// ── 共通パーツ ───────────────────────────────────────────
function empPicker(label="") {
  return `<div class="emp-picker">
    ${label ? `<div style="font-size:13px;font-weight:600;margin-bottom:6px">${label}</div>` : ""}
    <select onchange="selId=this.value;ieId=null;render()" style="font-size:15px">
      ${employees.map(e => `<option value="${e.id}" ${e.id===selId?"selected":""}>${e.name}（${e.type}）</option>`).join("")}
    </select>
  </div>`;
}

function sidebar() {
  return `<div class="sidebar">
    <div class="sidebar-label">従業員</div>
    ${employees.map(e => `
      <button class="sidebar-btn" onclick="selId='${e.id}';ieId=null;render()"
        style="border-left:${e.id===selId?"2px solid var(--blue)":"2px solid transparent"};background:${e.id===selId?"var(--surface)":"transparent"};font-weight:${e.id===selId?700:400}">
        <div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.name}</div>
        ${e.dept ? `<div style="font-size:11px;color:var(--gray)">${e.dept}</div>` : ""}
      </button>`).join("")}
  </div>`;
}

// ── 打刻 ────────────────────────────────────────────────
function rClock() {
  const t = today(), rec = records.find(r => r.eid===selId && r.date===t);
  const h = calcH(rec?.ci, rec?.co), emp = employees.find(e => e.id===selId);
  const now = new Date();
  const ts = `${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}:${String(now.getSeconds()).padStart(2,"0")}`;
  const ds = now.toLocaleDateString("ja-JP",{year:"numeric",month:"long",day:"numeric",weekday:"short"});
  const isWork = rec?.ci && !rec?.co, isDone = rec?.ci && rec?.co;
  const status = isWork ? `<span class="badge b-green">● 勤務中</span>` : isDone ? `<span class="badge b-blue">✓ 退勤済み</span>` : `<span class="badge b-gray">未出勤</span>`;
  const canIn = !rec?.ci, canOut = !!isWork;
  return `<div style="display:flex;gap:0">
    ${sidebar()}
    <div class="layout-main" style="flex:1;padding:0 4px;max-width:440px">
      ${empPicker()}
      ${emp ? `
      <div style="margin-bottom:12px">
        <div style="font-size:18px;font-weight:700">${emp.name}${tb(emp.type)}</div>
        ${emp.dept ? `<div style="font-size:13px;color:var(--gray);margin-top:2px">${emp.dept}</div>` : ""}
      </div>
      <div style="background:var(--surface);border-radius:14px;padding:24px 16px;text-align:center;margin-bottom:12px">
        <div style="font-size:44px;font-weight:700;letter-spacing:-2px;font-variant-numeric:tabular-nums;line-height:1" id="clockDisp">${ts}</div>
        <div style="font-size:13px;color:var(--gray);margin-top:6px">${ds}</div>
        <div style="margin-top:10px">${status}</div>
      </div>
      <div class="stat-grid">
        <div class="stat"><div class="stat-label">出勤時刻</div><div class="stat-value">${rec?.ci||"—"}</div></div>
        <div class="stat"><div class="stat-label">退勤時刻</div><div class="stat-value">${rec?.co||"—"}</div></div>
        <div class="stat"><div class="stat-label">勤務時間</div><div class="stat-value">${h>0?h.toFixed(1)+"h":"—"}</div></div>
      </div>
      <div class="punch-grid">
        <button class="punch-btn" ${canIn?"":"disabled"} onclick="doClock('in')"
          style="background:${canIn?"var(--blue)":"var(--surface)"};color:${canIn?"#fff":"var(--gray)"}">⬆ 出勤</button>
        <button class="punch-btn" ${canOut?"":"disabled"} onclick="doClock('out')"
          style="background:${canOut?"var(--red-bg)":"var(--surface)"};color:${canOut?"var(--red)":"var(--gray)"};border:${canOut?"0.5px solid #F09595":"none"}">⬇ 退勤</button>
      </div>` : `<div class="empty">従業員を選択してください</div>`}
    </div>
  </div>`;
}
function doClock(dir) {
  const t = today();
  if (dir === "in") {
    const n = nowHM(); records.push({id:"r"+Date.now(),eid:selId,date:t,ci:n,co:null});
    logC("打刻",selId,t,null,{ci:n,co:null},"出勤打刻");
  } else {
    const r = records.find(r => r.eid===selId && r.date===t);
    if (r) { const n = nowHM(); logC("打刻",selId,t,{ci:r.ci,co:r.co},{ci:r.ci,co:n},"退勤打刻"); r.co = n; }
  }
  persist(); render();
}

// ── 月次レポート ─────────────────────────────────────────
function rReport() {
  const mr = records.filter(r => r.date.startsWith(reportMonth));
  const emp = employees.find(e => e.id===selId) || employees[0];
  const empRecs = mr.filter(r => r.eid===emp.id).sort((a,b) => a.date.localeCompare(b.date));
  const allRows = employees.map(e => {
    const er = mr.filter(r => r.eid===e.id);
    return { ...e,
      th: er.reduce((s,r) => s+calcH(r.ci,r.co), 0),
      wd: er.filter(r => r.ci).length,
      ot: er.reduce((s,r) => s+Math.max(0,calcH(r.ci,r.co)-8), 0)
    };
  });

  const dayRows = empRecs.map(r => {
    const h = calcH(r.ci,r.co), ot = Math.max(0,h-8);
    const nCorr = corrections.filter(c => c.eid===emp.id && c.date===r.date).length;
    if (ieId === r.id) return `<tr style="background:var(--blue-bg)"><td colspan="6" style="padding:0">
      <div class="edit-inline">

      <td>${r.ci||`<span style="color:var(--gray)">—</span>`}</td>
      <td>${r.co||`<span style="color:var(--gray)">未</span>`}</td>

  const typeClr = {打刻:"b-blue",修正:"b-orange",追加:"b-green",削除:"b-red"};

    else if (c.type==="追加"&&c.after) diff=`<span class="diff-a">${c.after.ci||"—"}〜${c.after.co||"—"}（追加）</span>`;

      diff=`出勤:${bci!==aci?`<span class="diff-b">${bci}</span><span class="diff-a">${aci}</span>`:`${aci}`} 退勤:${bco!==aco?`<span class="diff-b">${bco}</span><span class="diff-a">${aco}</span>`:`${aco}`}`;
    } else if (c.after) diff=`<span class="diff-a">${c.after.ci||"—"}〜${c.after.co||"—"}</span>`;
    return `<tr>
      <td style="white-space:nowrap;color:var(--gray);font-size:11px">${fdt(c.ts)}</td>

  const corrPanel = showCorr ? `

        <div style="font-size:14px;font-weight:700">📋 修正履歴</div>
        <div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center">
          ${["all","打刻","修正","追加","削除"].map(f => {
            const n = f==="all" ? corrections.length : corrections.filter(c => c.type===f).length;
            return `<button class="btn btn-sm ${corrFilter===f?"btn-p":"btn-s"}" onclick="corrFilter='${f}';render()">${f==="all"?"全":f}(${n})</button>`;

      ${!corrections.length ? `<div class="empty">修正履歴がありません</div>` : `<div class="tbl-wrap"><table>

        <tbody>${corrRows||`<tr><td colspan="6" class="empty">該当なし</td></tr>`}</tbody>
      </table></div>`}
    </div>` : "";

  return `<div style="display:flex;gap:0">
    ${sidebar()}
    <div class="layout-main" style="flex:1;padding:0 4px;min-width:0">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap">
        <div style="font-size:17px;font-weight:700">月次レポート</div>
        <input type="month" value="${reportMonth}" onchange="reportMonth=this.value;ieId=null;render()" style="font-size:14px;width:auto;padding:6px 8px">
        <button class="btn btn-sm ${showCorr?"btn-p":"btn-s"}" onclick="showCorr=!showCorr;corrFilter='all';render()">
          📋 修正履歴${corrections.length?` (${corrections.length})`:""}
        </button>
        <span class="save-pill" style="margin-left:auto"></span>
      </div>
      <div class="stat-grid">
        <div class="stat"><div class="stat-label">総勤務時間</div><div class="stat-value">${allRows.reduce((s,e)=>s+e.th,0).toFixed(1)}h</div></div>
        <div class="stat"><div class="stat-label">総残業時間</div><div class="stat-value" style="color:${allRows.reduce((s,e)=>s+e.ot,0)>0?"var(--red)":"inherit"}">${allRows.reduce((s,e)=>s+e.ot,0).toFixed(1)}h</div></div>
        <div class="stat"><div class="stat-label">延べ出勤</div><div class="stat-value">${allRows.reduce((s,e)=>s+e.wd,0)}日</div></div>
      </div>
      ${empPicker("従業員を選択")}
      <div class="card">
        <div class="tbl-wrap"><table>
          <thead><tr><th>氏名</th><th>雇用</th><th>出勤</th><th>勤務</th><th>残業</th></tr></thead>
          <tbody>${allRows.map(e => `<tr style="cursor:pointer;background:${e.id===selId?"var(--blue-bg)":"transparent"}" onclick="selId='${e.id}';ieId=null;render()">
            <td style="font-weight:700">${e.name}${e.id===selId?`<span class="badge b-blue" style="margin-left:5px">選択中</span>`:""}</td>
            <td>${tb(e.type)}</td><td>${e.wd}日</td><td>${e.th.toFixed(1)}h</td>
            <td style="color:${e.ot>0?"var(--red)":"var(--gray)"}">${e.ot.toFixed(1)}h</td>
          </tr>`).join("")}</tbody>
        </table></div>
      </div>
      ${corrPanel}
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px">
        <div style="font-size:14px;font-weight:700">${emp.name} の日別明細</div>
        <button class="btn btn-p btn-sm" onclick="ieId='new_${emp.id}';render()">＋ 打刻追加</button>
      </div>

        <div class="tbl-wrap"><table>
          <thead><tr><th>日付</th><th>出勤</th><th>退勤</th><th>勤務</th><th>残業</th><th>操作</th></tr></thead>
          <tbody>
            ${empRecs.length ? dayRows : `<tr><td colspan="6" class="empty">打刻データなし</td></tr>`}
            ${ieId==="new_"+emp.id ? `<tr style="background:var(--blue-bg)"><td colspan="6" style="padding:0">
              <div class="edit-inline">
                <div><label>日付</label><input type="date" id="nw-d" value="${reportMonth}-01" style="width:148px"></div>
                <div><label>出勤</label><input type="time" id="nw-ci" value="09:00" style="width:116px"></div>
                <div><label>退勤</label><input type="time" id="nw-co" value="18:00" style="width:116px"></div>
                <div style="flex:1;min-width:140px"><label>修正理由</label><input type="text" id="nw-n" placeholder="例: 打ち忘れ"></div>
                <div style="display:flex;gap:6px;padding-top:18px">
                  <button class="btn btn-p btn-sm" onclick="saveNew('${emp.id}')">✓ 追加</button>

                </div>
              </div></td></tr>` : ""}
          </tbody>
        </table></div>

function saveEdit(rid, eid) {
  const r = records.find(x => x.id===rid); if (!r) return;
  const nd=document.getElementById("ei-d")?.value||r.date;
  const nci=document.getElementById("ei-ci")?.value||"";
  const nco=document.getElementById("ei-co")?.value||"";
  const note=document.getElementById("ei-n")?.value||"手動修正";
  const before={ci:r.ci,co:r.co,date:r.date};
  r.date=nd; r.ci=nci||null; r.co=nco||null;
  logC("修正",eid,nd,before,{ci:r.ci,co:r.co,date:nd},note);
  ieId=null; persist(); render();
}
function saveNew(eid) {
  const date=document.getElementById("nw-d")?.value;
  const ci=document.getElementById("nw-ci")?.value||"";
  const co=document.getElementById("nw-co")?.value||"";
  const note=document.getElementById("nw-n")?.value||"打刻追加";
  if (!date) { alert("日付を入力してください"); return; }
  const rec={id:"r"+Date.now(),eid,date,ci:ci||null,co:co||null};
  records.push(rec);
  logC("追加",eid,date,null,{ci:rec.ci,co:rec.co},note);
  ieId=null; persist(); render();
}
function delRec(rid, eid, date) {
  if (!confirm("この打刻データを削除しますか？")) return;
  const r=records.find(x => x.id===rid);
  if (r) logC("削除",eid,date,{ci:r.ci,co:r.co},null,"打刻削除");
  records=records.filter(x => x.id!==rid);
  persist(); render();
}

// ── 給与計算 ─────────────────────────────────────────────
function rPayroll() {
  const mr = records.filter(r => r.date.startsWith(reportMonth));
  const rows = employees.map(emp => {
    const er=mr.filter(r => r.eid===emp.id);
    const th=er.reduce((s,r)=>s+calcH(r.ci,r.co),0);
    const ot=er.reduce((s,r)=>s+Math.max(0,calcH(r.ci,r.co)-8),0);
    return {...emp,th,ot,p:calcPay(emp,th,ot),recs:er.sort((a,b)=>a.date.localeCompare(b.date))};
  });
  const wp=rows.filter(e=>e.p),tot=wp.reduce((s,e)=>s+e.p.total,0),totOT=wp.reduce((s,e)=>s+e.p.op,0);
  return `<div style="padding:0 4px">

      <div class="stat"><div class="stat-label">給与設定済み</div><div class="stat-value">${wp.length}名</div></div>
    </div>
    <div class="card"><div class="tbl-wrap"><table>
      <thead><tr><th>氏名</th><th>雇用</th><th>勤務</th><th>残業</th><th>残業代</th><th>支給</th></tr></thead>
      <tbody>
        ${rows.map(e => { const p=e.p; return `
          <tr style="cursor:pointer" onclick="toggleRow('py${e.id}')">
            <td style="font-weight:700">${e.name}</td><td>${tb(e.type)}</td>
            <td>${e.th.toFixed(1)}h</td>
            <td style="color:${e.ot>0?"var(--red)":"var(--gray)"}">${e.ot.toFixed(1)}h</td>
            <td style="color:${p?.op>0?"var(--red)":"var(--gray)"}">${p?yen(p.op):"—"}</td>
            <td style="font-weight:700;color:${p?"var(--blue-text)":"var(--gray)"}">${p?yen(p.total):"未設定"}</td>
          </tr>
          <tr id="py${e.id}" style="display:none;background:#f5f4f1"><td colspan="6" style="padding:12px">
            ${!p ? `<div style="color:var(--gray);font-size:13px">「従業員管理」で給与を設定してください。</div>` : `
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
              <div>
                <div style="font-weight:700;font-size:12px;color:var(--gray);margin-bottom:6px">給与内訳</div>
                ${e.type==="正社員" ? `
                  <div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:0.5px solid var(--border)"><span style="color:var(--gray)">基本給</span><span>${yen(p.base)}</span></div>
                  <div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:0.5px solid var(--border)"><span style="color:var(--gray)">時間単価</span><span>${yen(p.hr)}/h</span></div>
                  <div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:0.5px solid var(--border)"><span style="color:var(--red)">残業代×1.25</span><span style="color:var(--red)">${yen(p.op)}</span></div>
                ` : `
                  <div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:0.5px solid var(--border)"><span style="color:var(--gray)">時給</span><span>${yen(p.hr)}/h</span></div>
                  <div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:0.5px solid var(--border)"><span style="color:var(--gray)">通常給与</span><span>${yen(p.base)}</span></div>
                  <div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:0.5px solid var(--border)"><span style="color:var(--red)">残業代×1.25</span><span style="color:var(--red)">${yen(p.op)}</span></div>
                `}
                <div style="display:flex;justify-content:space-between;padding:5px 0;font-weight:700;color:var(--blue-text)"><span>支給合計</span><span>${yen(p.total)}</span></div>
              </div>
              <div>
                <div style="font-weight:700;font-size:12px;color:var(--gray);margin-bottom:6px">日別明細</div>
                ${e.recs.map(r => { const h=calcH(r.ci,r.co),ot=Math.max(0,h-8),dp=e.type==="正社員"?Math.round(p.hr*1.25*ot):Math.round(p.hr*(h-ot)+p.hr*1.25*ot); return `

  </div>`;
}
function toggleRow(id) { const el=document.getElementById(id); if(el) el.style.display=el.style.display==="none"?"table-row":"none"; }

function lp(id) {
  const g = q => document.getElementById(q);
  const name=g(`fn${id}`)?.value||"", dept=g(`fd${id}`)?.value||"", type=g(`ft${id}`)?.value||"パート", sal=Number(g(`fs${id}`)?.value)||0;
  if(g(`pn${id}`)) g(`pn${id}`).textContent = name || "氏名を入力";
  if(g(`pd${id}`)) g(`pd${id}`).textContent = dept;
  if(g(`pt${id}`)) g(`pt${id}`).innerHTML = tb(type);
  if(g(`ps${id}`)) g(`ps${id}`).textContent = sal>0 ? (type==="正社員" ? `月給 ${yen(sal)}` : `時給 ${yen(sal)}`) : "";
  if(g(`pa${id}`)) { g(`pa${id}`).textContent=name?name[0]:"?"; g(`pa${id}`).style.background=abg(type); g(`pa${id}`).style.color=acl(type); }
  if(g(`fl${id}`)) g(`fl${id}`).textContent = type==="正社員" ? "月給（円）" : "時給（円）";
  if(g(`fhw${id}`)) g(`fhw${id}`).style.display = type==="正社員" ? "block" : "none";
}
function svEdit(id) {
  const name = document.getElementById(`fn${id}`)?.value?.trim();
  if (!name) { alert("氏名を入力してください"); return; }
  const emp = employees.find(e => e.id===id); if (!emp) return;
  emp.name   = name;
  emp.dept   = document.getElementById(`fd${id}`)?.value?.trim() || "";
  emp.type   = document.getElementById(`ft${id}`)?.value || "パート";
  emp.salary = Number(document.getElementById(`fs${id}`)?.value) || 0;
  emp.stdH   = Number(document.getElementById(`fh${id}`)?.value) || 160;
  editId = null; persist(); render();
}
function addEmp() {
  const name = document.getElementById("nn")?.value?.trim();
  if (!name) { alert("氏名を入力してください"); return; }
  employees.push({ id:"e"+Date.now(), name, dept:document.getElementById("nd")?.value?.trim()||"", type:document.getElementById("nt")?.value||"正社員", salary:Number(document.getElementById("ns")?.value)||0, stdH:Number(document.getElementById("nh")?.value)||160 });
  persist(); render();
}
function delEmp(id) {
  employees = employees.filter(e => e.id!==id);
  records   = records.filter(r => r.eid!==id);
  if (selId===id) selId = employees[0]?.id || null;
  if (editId===id) editId = null;
  persist(); render();
}

setInterval(() => {
  const el = document.getElementById("clockDisp"); if (!el) return;
  const d = new Date();
  el.textContent = `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}:${String(d.getSeconds()).padStart(2,"0")}`;
}, 1000);

render();
</script>
